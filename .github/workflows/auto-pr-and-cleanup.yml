name: Auto PR and Branch Cleanup

on:
  push:
    branches-ignore:
      - main
  pull_request:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    name: Create Pull Request
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          title: "Auto PR: ${{ github.ref_name }}"
          body: |
            Automated pull request from branch `${{ github.ref_name }}`.

            **Commit:** ${{ github.sha }}
            **Author:** ${{ github.actor }}
          draft: false

  delete-branch-on-merge:
    name: Delete Branch After Merge
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.head.ref != 'main'
    steps:
      - name: Delete merged branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.payload.pull_request.head.ref;
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`
              });
              console.log(`Deleted branch: ${branch}`);
            } catch (e) {
              console.log(`Branch ${branch} may already be deleted: ${e.message}`);
            }
