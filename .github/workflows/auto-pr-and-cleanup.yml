name: Auto PR, Merge and Branch Cleanup

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  create-and-merge-pr:
    name: Create and Auto-Merge PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          title: "Auto PR: ${{ github.ref_name }}"
          body: |
            Automated pull request from branch `${{ github.ref_name }}`.

            **Commit:** ${{ github.sha }}
            **Author:** ${{ github.actor }}
          draft: false

      - name: Auto-Merge Pull Request
        if: steps.create_pr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt('${{ steps.create_pr.outputs.pull-request-number }}');
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'squash'
            });
            console.log(`Merged PR #${prNumber}`);

            // Delete the branch after merge
            const branch = '${{ github.ref_name }}';
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`
              });
              console.log(`Deleted branch: ${branch}`);
            } catch (e) {
              console.log(`Branch already deleted or error: ${e.message}`);
            }
